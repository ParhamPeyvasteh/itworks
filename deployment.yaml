apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-gitops-app
  namespace: my-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: my-gitops-app
  template:
    metadata:
      labels:
        app: my-gitops-app
    spec:
      containers:
      - name: app
        image: parhampvst/my-gitops-app:v1.0.1
        ports:
        - containerPort: 3000
        env:
        - name: VERSION
          value: "1.0.0"
---
apiVersion: v1
kind: Service
metadata:
  name: my-gitops-app-service
  namespace: my-app
spec:
  selector:
    app: my-gitops-app
  ports:
  - port: 80
    targetPort: 3000
  type: ClusterIP
